<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>CoffeePaste 图标转换工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 40px;
            background: #f5f5f7;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #1d1d1f;
        }

        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .preview-box {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-top: 20px;
        }

        .svg-preview {
            background: #eee;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info {
            flex: 1;
        }

        .btn {
            display: inline-block;
            background: #0071e3;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0077ed;
        }

        .btn-secondary {
            background: #86868b;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #6e6e73;
        }

        canvas {
            display: none;
        }

        code {
            background: #f0f0f0;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>图标转换工具</h1>
        <p>此工具将 SVG 转换为应用所需的 PNG 格式。点击下方按钮下载后，请按照说明将其拖入 Xcode 的 Assets 中。</p>

        <!-- 主图标部分 -->
        <div class="section">
            <h2>1. 主应用图标 (AppIcon)</h2>
            <div class="preview-box">
                <div class="svg-preview" id="app-svg-container">
                    <!-- 这里会插入 logo.svg -->
                </div>
                <div class="info">
                    <p>建议尺寸: <strong>1024 x 1024</strong></p>
                    <p>用途: Xcode <code>AppIcon</code> 槽位</p>
                    <button class="btn" onclick="convert('app-svg', 1024, 'AppIcon.png')">下载 1024px PNG</button>
                </div>
            </div>
        </div>

        <!-- 菜单栏图标部分 -->
        <div class="section">
            <h2>2. 菜单栏图标 (MenuBarIcon)</h2>
            <div class="preview-box">
                <div class="svg-preview" id="menu-svg-container" style="background: #333;">
                    <!-- 这里会插入 menubar_icon.svg -->
                </div>
                <div class="info">
                    <p>建议尺寸: <strong>18 x 18</strong> (@1x) 和 <strong>36 x 36</strong> (@2x)</p>
                    <p>用途: Xcode <code>MenuBarIcon</code> (Render As: Template)</p>
                    <button class="btn" onclick="convert('menu-svg', 18, 'MenuBarIcon.png')">下载 18px PNG (@1x)</button>
                    <button class="btn btn-secondary" onclick="convert('menu-svg', 36, 'MenuBarIcon@2x.png')">下载 36px
                        PNG (@2x)</button>
                </div>
            </div>
        </div>

        <canvas id="export-canvas"></canvas>
    </div>

    <script>
        const logoSvg = `<svg id="app-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <style>
    .stroke-main { stroke: #2C3E50; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .fill-white { fill: #FFFFFF; }
    .fill-accent { fill: #E67E22; }
    .stroke-accent { stroke: #E67E22; stroke-width: 4; stroke-linecap: round; fill: none; }
  </style>
  <rect x="40" y="20" width="48" height="65" rx="4" class="stroke-main fill-white" />
  <path d="M 54 20 V 14 C 54 11.5 56 9.5 58.5 9.5 H 69.5 C 72 9.5 74 11.5 74 14 V 20 Z" class="stroke-main fill-white" />
  <line x1="50" y1="20" x2="78" y2="20" class="stroke-main" />
  <line x1="50" y1="40" x2="78" y2="40" class="stroke-main" />
  <line x1="50" y1="55" x2="78" y2="55" class="stroke-main" />
  <line x1="50" y1="70" x2="68" y2="70" class="stroke-accent" />
  <circle cx="75" cy="70" r="3" class="fill-accent" />
  <path d="M 22 45 C 22 35 15 35 15 25" class="stroke-accent" />
  <path d="M 35 42 C 35 32 28 32 28 22" class="stroke-accent" />
  <path d="M 46 62 C 60 62 60 80 44 80" class="stroke-main" />
  <path d="M 10 52 L 14 84 C 14.5 89 18 92 23 92 H 37 C 42 92 45.5 89 46 84 L 50 52 Z" class="stroke-main fill-white" />
  <path d="M 12 65 Q 30 70 48 65" class="stroke-main" />
</svg>`;

        const menuSvg = `<svg id="menu-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <style>
    .stroke-main { stroke: white; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .fill-main { fill: white; }
  </style>
  <rect x="40" y="20" width="48" height="65" rx="4" class="stroke-main" />
  <path d="M 54 20 V 14 C 54 11.5 56 9.5 58.5 9.5 H 69.5 C 72 9.5 74 11.5 74 14 V 20 Z" class="stroke-main" />
  <line x1="50" y1="20" x2="78" y2="20" class="stroke-main" />
  <line x1="50" y1="40" x2="78" y2="40" class="stroke-main" />
  <line x1="50" y1="55" x2="78" y2="55" class="stroke-main" />
  <line x1="50" y1="70" x2="68" y2="70" class="stroke-main" />
  <circle cx="75" cy="70" r="3" class="fill-main" />
  <path d="M 22 45 C 22 35 15 35 15 25" class="stroke-main" />
  <path d="M 35 42 C 35 32 28 32 28 22" class="stroke-main" />
  <path d="M 46 62 C 60 62 60 80 44 80" class="stroke-main" />
  <path d="M 10 52 L 14 84 C 14.5 89 18 92 23 92 H 37 C 42 92 45.5 89 46 84 L 50 52 Z" class="stroke-main" />
</svg>`;

        document.getElementById('app-svg-container').innerHTML = logoSvg;
        document.getElementById('menu-svg-container').innerHTML = menuSvg;

        function convert(svgId, size, filename) {
            const svgElement = document.getElementById(svgId);
            const canvas = document.getElementById('export-canvas');
            const ctx = canvas.getContext('2d');

            // 设置画布尺寸
            canvas.width = size;
            canvas.height = size;

            // 清除画布
            ctx.clearRect(0, 0, size, size);

            // 将 SVG 转换为 Blob
            const xml = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            const img = new Image();
            img.onload = function () {
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);

                // 导出为 PNG
                const pngUrl = canvas.toDataURL("image/png");
                const downloadLink = document.createElement("a");
                downloadLink.href = pngUrl;
                downloadLink.download = filename;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            };
            img.src = url;
        }
    </script>
</body>

</html>
